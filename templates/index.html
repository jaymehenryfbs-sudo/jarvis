<!DOCTYPE html>
<html>
<head>
    <title>J.A.R.V.I.S. Interface</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: 'Courier New', monospace; text-align: center; }
        #arc-reactor { width: 150px; height: 150px; border: 5px solid #00d4ff; border-radius: 50%; margin: 50px auto; box-shadow: 0 0 20px #00d4ff; cursor: pointer; }
        .active { box-shadow: 0 0 50px #ff0000 !important; border-color: #ff0000 !important; }
        #status { font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <div id="arc-reactor" onclick="startListening()"></div>
    <h2 id="display">CLIQUEZ POUR PARLER</h2>
    <p id="status">SYSTÈME EN ATTENTE</p>

    <script>
        const synth = window.speechSynthesis;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fr-FR';

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 0.9; // Voix plus grave type Jarvis
            utter.rate = 1.1;
            synth.speak(utter);
        }

        function startListening() {
            document.getElementById('arc-reactor').classList.add('active');
            recognition.start();
        }

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('display').innerText = text;
            
            fetch('/command', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').innerText = data.response;
                speak(data.response);
                document.getElementById('arc-reactor').classList.remove('active');
            });
        };
    </script>
</body>
</html>
