name: Forge_APK_Final_Fixed
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Buildozer
        uses: kivy/buildozer-action@v1.2.2
        with:
          # La commande magique pour autoriser l'exécution
          command: buildozer --verbose android debug
          buildozer_version: master
